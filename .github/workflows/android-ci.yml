name: Android CI

on:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Assemble release APK
        run: ./gradlew assembleRelease -PappVersionName=pr-${{ github.event.pull_request.number || github.run_number }} -PappVersionCode=${{ github.run_number }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: mm__food__pr-${{ github.event.pull_request.number || github.run_number }}
          path: app/build/outputs/apk/release/*.apk
