name: Android Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          source .github/release.properties
          latest_tag="$(git tag -l "v${RELEASE_MAJOR}.*.*" --sort=-version:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            version_name="${RELEASE_MAJOR}.0.0"
          else
            current="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${current}"
            version_name="${major}.$((minor + 1)).0"
          fi

          IFS='.' read -r major minor patch <<< "${version_name}"
          version_code=$((major * 10000 + minor * 100 + patch))
          artifact_name="${APP_RELEASE_BASENAME}__${version_name}.apk"
          release_name="${APP_RELEASE_BASENAME}__${version_name}"

          echo "version_name=${version_name}" >> "${GITHUB_OUTPUT}"
          echo "version_code=${version_code}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"

      - name: Run unit tests
        run: ./gradlew test

      - name: Prepare release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "Release signing secrets not configured; building unsigned release APK."
            exit 0
          fi

          keystore_path="${RUNNER_TEMP}/release.keystore"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"
          echo "ANDROID_KEYSTORE_FILE=${keystore_path}" >> "${GITHUB_ENV}"
          echo "ANDROID_KEYSTORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}" >> "${GITHUB_ENV}"
          echo "ANDROID_KEY_ALIAS=${ANDROID_KEY_ALIAS}" >> "${GITHUB_ENV}"
          echo "ANDROID_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Assemble release APK
        run: ./gradlew assembleRelease -PappVersionName=${{ steps.version.outputs.version_name }} -PappVersionCode=${{ steps.version.outputs.version_code }}

      - name: Rename release APK
        shell: bash
        run: |
          mkdir -p releases
          apk_path="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          cp "${apk_path}" "releases/${{ steps.version.outputs.artifact_name }}"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.release_name }}
          path: releases/${{ steps.version.outputs.artifact_name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: ${{ steps.version.outputs.release_name }}
          generate_release_notes: true
          files: releases/${{ steps.version.outputs.artifact_name }}
