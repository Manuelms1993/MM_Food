name: Android Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          source .github/release.properties
          latest_tag="$(git tag -l "v${RELEASE_MAJOR}.*.*" --sort=-version:refname | head -n 1)"
          if [[ -z "${latest_tag}" ]]; then
            version_name="${RELEASE_MAJOR}.0.0"
          else
            current="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${current}"
            version_name="${major}.$((minor + 1)).0"
          fi

          IFS='.' read -r major minor patch <<< "${version_name}"
          version_code=$((major * 10000 + minor * 100 + patch))
          artifact_name="${APP_RELEASE_BASENAME}__${version_name}.apk"
          release_name="${APP_RELEASE_BASENAME}__${version_name}"

          echo "version_name=${version_name}" >> "${GITHUB_OUTPUT}"
          echo "version_code=${version_code}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"

      - name: Run unit tests
        run: ./gradlew test

      - name: Assemble release APK
        run: ./gradlew assembleRelease -PappVersionName=${{ steps.version.outputs.version_name }} -PappVersionCode=${{ steps.version.outputs.version_code }}

      - name: Prepare release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          required_vars=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required secret: ${var_name}" >&2
              exit 1
            fi
          done

          keystore_path="${RUNNER_TEMP}/release.keystore"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"

          {
            echo "ANDROID_KEYSTORE_FILE=${keystore_path}"
            echo "ANDROID_BUILD_TOOLS_DIR=${ANDROID_SDK_ROOT}/build-tools/34.0.0"
            echo "ALIGNED_APK_PATH=${RUNNER_TEMP}/app-release-aligned.apk"
            echo "FINAL_APK_PATH=${GITHUB_WORKSPACE}/releases/${{ steps.version.outputs.artifact_name }}"
          } >> "${GITHUB_ENV}"

      - name: Resolve unsigned APK path
        shell: bash
        run: |
          set -euo pipefail

          unsigned_apk_path="$(find app/build/outputs/apk/release -name '*-unsigned.apk' -print -quit)"
          if [[ -z "${unsigned_apk_path}" || ! -f "${unsigned_apk_path}" ]]; then
            echo "Unsigned release APK not found." >&2
            exit 1
          fi

          echo "UNSIGNED_APK_PATH=${unsigned_apk_path}" >> "${GITHUB_ENV}"

      - name: Align and sign release APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p releases

          "${ANDROID_BUILD_TOOLS_DIR}/zipalign" -f -p 4 "${UNSIGNED_APK_PATH}" "${ALIGNED_APK_PATH}"

          "${ANDROID_BUILD_TOOLS_DIR}/apksigner" sign \
            --ks "${ANDROID_KEYSTORE_FILE}" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --out "${FINAL_APK_PATH}" \
            "${ALIGNED_APK_PATH}"

      - name: Verify final APK
        shell: bash
        run: |
          set -euo pipefail

          echo "Final APK path: ${FINAL_APK_PATH}"
          ls -lh "${FINAL_APK_PATH}"
          file "${FINAL_APK_PATH}"
          unzip -t "${FINAL_APK_PATH}"
          "${ANDROID_BUILD_TOOLS_DIR}/zipalign" -c -P 16 -v 4 "${FINAL_APK_PATH}"
          "${ANDROID_BUILD_TOOLS_DIR}/apksigner" verify --verbose --print-certs "${FINAL_APK_PATH}"
          sha256sum "${FINAL_APK_PATH}"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-installable-apk
          path: ${{ github.workspace }}/releases/${{ steps.version.outputs.artifact_name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: ${{ steps.version.outputs.release_name }}
          generate_release_notes: true
          files: ${{ github.workspace }}/releases/${{ steps.version.outputs.artifact_name }}
